---
- name: Configure AKS
  hosts: localhost
  become: no

  tasks:

    - name: Create Argo CD namespace
      command: kubectl create namespace argocd
      ignore_errors: yes

    - name: Install Argo CD
      command: >
        kubectl apply
        -n argocd
        -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml

    - name: Wait for Argo CD Server
      command: >
        kubectl rollout status deployment/argocd-server
        -n argocd
        --timeout=600s

    - name: Wait for Argo CD Application Controller
      command: >
        kubectl rollout status deployment/argocd-application-controller
        -n argocd
        --timeout=600s

    - name: Wait for Argo CD Repo Server
      command: >
        kubectl rollout status deployment/argocd-repo-server
        -n argocd
        --timeout=600s

    - name: Expose Argo CD
      command: >
        kubectl patch svc argocd-server
        -n argocd
        -p '{"spec":{"type":"LoadBalancer"}}'

    - name: Create application namespace
      command: kubectl create namespace efinance
      ignore_errors: yes

    - name: Create backend secret
      shell: |
        kubectl create secret generic backend-secrets \
        -n efinance \
        --from-literal=OPENROUTER_API_KEY="{{ openrouter_api_key }}" \
        --dry-run=client \
        -o yaml | kubectl apply -f -

    - name: Deploy Argo CD Application
      command: kubectl apply -f argocd/application.yaml

    - name: Wait for frontend deployment
      command: >
        kubectl rollout status deployment/frontend
        -n efinance
        --timeout=600s
      ignore_errors: yes

    - name: Wait for backend deployment
      command: >
        kubectl rollout status deployment/backend
        -n efinance
        --timeout=600s
      ignore_errors: yes

    - name: Get Argo CD password
      shell: |
        kubectl -n argocd get secret argocd-initial-admin-secret \
        -o jsonpath="{.data.password}" | base64 -d
      register: argocd_password

    - name: Get Argo CD External IP
      shell: |
        kubectl get svc argocd-server \
        -n argocd \
        -o jsonpath='{.status.loadBalancer.ingress[0].ip}'
      register: argocd_ip

    - name: Show Argo CD URL
      debug:
        msg: "https://{{ argocd_ip.stdout }}"

    - name: Show Username
      debug:
        msg: "admin"

    - name: Show Password
      debug:
        msg: "{{ argocd_password.stdout }}"