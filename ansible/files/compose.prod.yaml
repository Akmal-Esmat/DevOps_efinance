services:
  frontend:
    image: akmall123/ef-frontend:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      BACKEND_INTERNAL_URL: http://backend:8000
    ports:
      - "3000:3000"

  backend:
    image: akmall123/ef-backend:${IMAGE_TAG}
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}