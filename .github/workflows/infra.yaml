name: Infrastructure

on:
  workflow_dispatch:

  push:
    paths:
      - "terraform/**"
      - "ansible/**"

permissions:
  id-token: write
  contents: read

jobs:
  infra:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve

      - name: Generate Ansible Inventory
        working-directory: terraform
        run: |
          PUBLIC_IP=$(terraform output -raw public_ip)

          cat > ../ansible/hosts.ini <<EOF
          [azure]
          vm ansible_host=$PUBLIC_IP ansible_user=akmal ansible_ssh_private_key_file=~/.ssh/id_ed25519
          EOF

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Install Docker Collection
        run: |
          ansible-galaxy collection install community.docker

      - name: Create SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Start VM
        run: |
          az vm start \
            --resource-group devops-rg \
            --name terraform-vm
      
      - name: Wait for SSH
        run: |
          PUBLIC_IP=$(terraform -chdir=terraform output -raw public_ip)
          until nc -z $PUBLIC_IP 22; do
            echo "Waiting for SSH..."
            sleep 10
          done

      - name: Run Playbook
        working-directory: ansible
        run: |
          ansible-playbook -i hosts.ini playbook.yml
