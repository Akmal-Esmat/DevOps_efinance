name: Infrastructure

on:
  workflow_dispatch:
  push:
    paths:
      - "terraform/**"
      - "ansible/**"
  workflow_run:
    workflows: ["deploy to Dockerhub"]
    types:
      - completed

permissions:
  id-token: write
  contents: read

jobs:
  provision:
    if: github.event_name != 'workflow_run'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    outputs:
      public_ip: ${{ steps.vm.outputs.ip }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve

      - name: Get VM public IP
        id: vm
        working-directory: terraform
        run: echo "ip=$(terraform output -raw public_ip)" >> "$GITHUB_OUTPUT"

  deploy:
    needs: [provision]
    if: always() && (needs.provision.result == 'success' || needs.provision.result == 'skipped') && (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      # UPDATED STEP: Check if VM exists, and safely recover if manually deleted
      - name: Ensure VM exists and is running
        working-directory: terraform
        run: |
          echo "Checking if VM 'terraform-vm' exists in resource group 'devops-rg'..."
          VM_EXISTS=$(az vm list --resource-group devops-rg --query "[?name=='terraform-vm'].name" -o tsv)
          
          if [ -z "$VM_EXISTS" ]; then
            echo "VM not found in Azure! Recreating it via Terraform..."
            terraform apply -auto-approve
          else
            echo "VM exists. Ensuring it is started..."
            az vm start --resource-group devops-rg --name terraform-vm
          fi

      # Dynamic IP Fetch step updated to dynamically pull fresh IP if recreated
      - name: Get VM public IP
        id: vm
        working-directory: terraform
        run: |
          IP=$(terraform output -raw public_ip)
          echo "ip=$IP" >> "$GITHUB_OUTPUT"

      # --- Rest of your original steps remain identical ---
      - name: Generate Ansible Inventory
        run: |
          cat > ansible/hosts.ini <<EOF
          [azure]
          vm ansible_host=${{ steps.vm.outputs.ip }} ansible_user=akmal ansible_ssh_private_key_file=~/.ssh/id_ed25519
          EOF

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Install Docker Collection
        run: ansible-galaxy collection install community.docker

      - name: Create SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Wait for VM to be running
        run: |
          while true; do
            STATUS=$(az vm get-instance-view \
              --resource-group devops-rg \
              --name terraform-vm \
              --query "instanceView.statuses[?starts_with(code,'PowerState/')].displayStatus" \
              --output tsv)
            echo "Current status: $STATUS"
            if [ "$STATUS" = "VM running" ]; then
              break
            fi
            sleep 5
          done

      - name: Wait for SSH
        run: |
          until nc -z ${{ steps.vm.outputs.ip }} 22; do
            echo "Waiting for SSH..."
            sleep 10
          done

      - name: Add SSH known host
        run: ssh-keyscan ${{ steps.vm.outputs.ip }} >> ~/.ssh/known_hosts

      - name: Run Playbook
        working-directory: ansible
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha || github.sha }}" | cut -c1-7)

          ansible-playbook -i hosts.ini playbook.yml \
            -e "image_tag=$SHORT_SHA" \
            -e "openrouter_api_key=${{ secrets.OPENROUTER_API_KEY }}"