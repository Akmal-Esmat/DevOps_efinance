name: deploy to Dockerhub

on: 
  push:
    branches:
      - main

jobs:
  SCA:
    runs-on: ubuntu-latest
    steps:
        # The Checkout step clones the Git repository.
      - name: Checkout
        uses: actions/checkout@v7.0.0
        
      - name: Scan files
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          # vuln is the default
          # secret is for hard coded secrets
          # misconfig is for insecure Dockerfiles, Kubernetes manifests,...
          scanners: vuln,secret,misconfig
          # fail if high/critical severity
          # severity: HIGH,CRITICAL
          # exit-code: '1'
          format: json
          output: sca-report.json

      - name: Upload SCA report
        if: always() # run even if a previous step failed
        uses: actions/upload-artifact@v4
        with:
          name: sca-report
          path: sca-report.json
          retention-days: 1
          
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install -r Backend/requirements.txt
      - run: pip install -r Backend/requirements-dev.txt
      - run: pytest Backend/ --junitxml=backend-report.xml

      - name: Upload backend test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-report
          path: backend-report.xml
          retention-days: 1

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install --prefix Frontend
      - run: npm test --prefix Frontend -- --json --outputFile=frontend-report.json

      - name: Upload frontend test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-report
          path: Frontend/frontend-report.json
          retention-days: 1
      
  publish:
    needs: [SCA, test-backend, test-frontend]
    runs-on: ubuntu-latest
    steps:

      # The Checkout step clones the Git repository again (each job is independent).
      - name: Checkout
        uses: actions/checkout@v7.0.0
        
      - name: Docker Login
        uses: docker/login-action@v4.2.0
        with:
            # Username to connect to Docker registry
            username: ${{ secrets.DOCKERHUB_USERNAME }}
            # Password or token to connect to Docker registry
            password: ${{ secrets.DOCKERHUB_TOKEN }}
              
      - name: Build images
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: docker compose build

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ef-frontend:latest
          # severity: HIGH,CRITICAL
          # exit-code: '1'
          format: json
          output: frontend-image-report.json
    
      - name: Scan backend image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ef-backend:latest
          # severity: HIGH,CRITICAL
          # exit-code: '1'
          format: json
          output: backend-image-report.json

      - name: Upload image scan reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: image-reports
          path: |
            frontend-image-report.json
            backend-image-report.json
          retention-days: 1
      
      - name: Show local images
        run: docker images
      
      - name: Tag frontend
        run: docker tag ef-frontend:latest ${{ secrets.DOCKERHUB_USERNAME }}/ef-frontend
      
      - name: Push frontend
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/ef-frontend:latest

      - name: Tag backend
        run: docker tag ef-backend:latest ${{ secrets.DOCKERHUB_USERNAME }}/ef-backend

      - name: Push backend
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/ef-backend:latest

  report-summary:
    needs: [SCA, test-backend, test-frontend, publish]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: reports

      - name: Extract counts and fill template
        run: |
          extract_counts() {
            local file=$1
            local prefix=$2
            echo "${prefix}_CRIT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' "$file")" >> $GITHUB_ENV
            echo "${prefix}_HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' "$file")" >> $GITHUB_ENV
            echo "${prefix}_MED=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length' "$file")" >> $GITHUB_ENV
            echo "${prefix}_LOW=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="LOW")] | length' "$file")" >> $GITHUB_ENV
          }

          extract_counts reports/sca-report/sca-report.json SCA
          extract_counts reports/image-reports/backend-image-report.json BACKEND_IMG
          extract_counts reports/image-reports/frontend-image-report.json FRONTEND_IMG

          echo "SCA_SECRETS=$(jq '[.Results[]?.Secrets[]?] | length' reports/sca-report/sca-report.json)" >> $GITHUB_ENV
          echo "SCA_MISCONFIG=$(jq '[.Results[]?.Misconfigurations[]?] | length' reports/sca-report/sca-report.json)" >> $GITHUB_ENV

          if [ -f reports/backend-report/backend-report.xml ]; then
            echo "BACKEND_PASS=$(grep -oP 'tests="\K[0-9]+' reports/backend-report/backend-report.xml | head -1)" >> $GITHUB_ENV
            echo "BACKEND_FAIL=$(grep -oP 'failures="\K[0-9]+' reports/backend-report/backend-report.xml | head -1)" >> $GITHUB_ENV
          fi

          if [ -f reports/frontend-report/frontend-report.json ]; then
            echo "FRONTEND_PASS=$(jq '.numPassedTests' reports/frontend-report/frontend-report.json)" >> $GITHUB_ENV
            echo "FRONTEND_FAIL=$(jq '.numFailedTests' reports/frontend-report/frontend-report.json)" >> $GITHUB_ENV
          fi

      - name: Fill HTML template
        env:
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          sed -e "s/__RUN_NUMBER__/$RUN_NUMBER/" \
              -e "s|__REPO__|$REPO|" \
              -e "s/__SHA__/$SHA/" \
              -e "s/__SCA_CRIT__/$SCA_CRIT/" -e "s/__SCA_HIGH__/$SCA_HIGH/" \
              -e "s/__SCA_MED__/$SCA_MED/" -e "s/__SCA_LOW__/$SCA_LOW/" \
              -e "s/__BACKEND_IMG_CRIT__/$BACKEND_IMG_CRIT/" -e "s/__BACKEND_IMG_HIGH__/$BACKEND_IMG_HIGH/" \
              -e "s/__BACKEND_IMG_MED__/$BACKEND_IMG_MED/" -e "s/__BACKEND_IMG_LOW__/$BACKEND_IMG_LOW/" \
              -e "s/__FRONTEND_IMG_CRIT__/$FRONTEND_IMG_CRIT/" -e "s/__FRONTEND_IMG_HIGH__/$FRONTEND_IMG_HIGH/" \
              -e "s/__FRONTEND_IMG_MED__/$FRONTEND_IMG_MED/" -e "s/__FRONTEND_IMG_LOW__/$FRONTEND_IMG_LOW/" \
              -e "s/__SCA_SECRETS__/$SCA_SECRETS/" -e "s/__SCA_MISCONFIG__/$SCA_MISCONFIG/" \
              -e "s/__BACKEND_PASS__/${BACKEND_PASS:-N\/A}/" -e "s/__BACKEND_FAIL__/${BACKEND_FAIL:-N\/A}/" \
              -e "s/__FRONTEND_PASS__/${FRONTEND_PASS:-N\/A}/" -e "s/__FRONTEND_FAIL__/${FRONTEND_FAIL:-N\/A}/" \
              -e "s/__BACKEND_STATUS__/success/" \
              -e "s/__BACKEND_CLASS__/pass/" \
              -e "s/__FRONTEND_STATUS__/success/" \
              -e "s/__FRONTEND_CLASS__/pass/" \
              .github/workflows/email-template.html > final-report.html

      - name: Upload final report (for local review before email)
        uses: actions/upload-artifact@v4
        with:
          name: final-report
          path: final-report.html
          retention-days: 1

      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_APP_PASSWORD }}
          subject: "Pipeline Report #${{ github.run_number }} — ${{ github.repository }}"
          to: akmalesmat2016@gmail.com
          from: CI Pipeline
          html_body: file://final-report.html
          attachments: reports/**/*.json,reports/**/*.xml
