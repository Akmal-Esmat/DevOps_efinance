name: Infrastructure - AKS

on:

  workflow_dispatch:

  push:
    paths:
      - "terraform/**"
      - "ansible/**"
      - "argocd/**"

  workflow_run:
    workflows:
      - "deploy to Dockerhub"
    types:
      - completed
    branches:
      - main


permissions:
  id-token: write
  contents: read


jobs:

  terraform:


    # Run terraform normally
    # Skip when triggered after docker workflow
    if: github.event_name != 'workflow_run'


    runs-on: ubuntu-latest


    defaults:
      run:
        shell: bash


    steps:


      - name: Checkout
        uses: actions/checkout@v4



      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}



      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3



      - name: Terraform Init
        working-directory: terraform/aks
        run: terraform init



      - name: Terraform Validate
        working-directory: terraform/aks
        run: terraform validate



      - name: Terraform Apply
        working-directory: terraform/aks
        run: terraform apply -auto-approve





  aks-bootstrap:


    needs: terraform


    if: |
      always() &&
      (
        needs.terraform.result == 'success' ||
        needs.terraform.result == 'skipped'
      ) &&
      (
        github.event_name != 'workflow_run' ||
        github.event.workflow_run.conclusion == 'success'
      )


    runs-on: ubuntu-latest


    defaults:
      run:
        shell: bash



    steps:


      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}



      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}



      - name: Setup kubectl
        uses: azure/setup-kubectl@v4



      - name: Get AKS credentials
        run: |

          az aks get-credentials \
            --resource-group rg-efinance \
            --name efinance-aks \
            --overwrite-existing



      - name: Install Ansible
        run: |

          sudo apt update
          sudo apt install -y ansible



      - name: Run AKS Bootstrap
        working-directory: ansible
        run: |

          ansible-playbook aks/bootstrap.yml \
            -e openrouter_api_key="${{ secrets.OPENROUTER_API_KEY }}"