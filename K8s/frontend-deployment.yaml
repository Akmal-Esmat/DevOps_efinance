apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: efinance


spec:

  replicas: 1


  selector:
    matchLabels:
      app: frontend


  template:

    metadata:
      labels:
        app: frontend


    spec:

      containers:

      - name: frontend

        image: efinanceacr12345.azurecr.io/ef-frontend:2c2b571


        ports:

        - containerPort: 3000


        resources:

          requests:
            cpu: "250m"
            memory: "256Mi"

          limits:
            cpu: "500m"
            memory: "512Mi"