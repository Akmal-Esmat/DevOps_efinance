apiVersion: apps/v1
kind: Deployment
metadata:
  name: webserver
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: frontend
          image: akmall123/ef-frontend:latest
          ports:
            - containerPort: 3000

        - name: backend
          image: akmall123/ef-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openrouter-secret
                  key: OPENROUTER_API_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: app-service
spec:
  type: NodePort
  selector:
    app: web
  ports:
    - name: frontend
      port: 3000         # Accessible inside the cluster
      targetPort: 3000   # Port your frontend container listens on
      # nodePort: 3000
    - name: backend
      port: 8000       # Accessible inside the cluster at http://app-service:5000
      targetPort: 8000 # Port your backend container listens on
      # nodePort: 8000